<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --accent: #c8442a;
      --muted: #8a8070;
      --line: #d4cdc0;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 80px 1fr 80px;
      border: 12px solid var(--ink);
    }

    /* Top bar */
    .top-bar {
      grid-column: 1 / -1;
      border-bottom: 3px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
    }

    .top-bar .label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .top-bar .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Left gutter */
    .left-gutter {
      border-right: 2px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 20px 0;
    }

    .left-gutter span {
      writing-mode: vertical-rl;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      transform: rotate(180deg);
    }

    /* Main content */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative lines */
    .main::before {
      content: '';
      position: absolute;
      top: 30px; left: 30px; right: 30px;
      height: 1px;
      background: var(--line);
    }
    .main::after {
      content: '';
      position: absolute;
      bottom: 30px; left: 30px; right: 30px;
      height: 1px;
      background: var(--line);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(56px, 10vw, 120px);
      font-weight: 900;
      line-height: 0.92;
      text-align: center;
      letter-spacing: -0.02em;
      position: relative;
    }

    .headline .hello {
      display: block;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
    }

    .headline .world {
      display: block;
      font-style: italic;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s;
    }

    .sub {
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    .divider {
      margin-top: 40px;
      width: 48px;
      height: 2px;
      background: var(--ink);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Right gutter */
    .right-gutter {
      border-left: 2px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Bottom bar */
    .bottom-bar {
      grid-column: 1 / -1;
      border-top: 3px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 44px;
    }

    .bottom-bar .ts {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .bottom-bar .counter {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <span class="label">Vol. I &nbsp;&mdash;&nbsp; Issue 001</span>
      <div class="dot"></div>
      <span class="label" id="dateLabel"></span>
    </div>

    <div class="left-gutter">
      <span>A&nbsp;new&nbsp;beginning</span>
    </div>

    <main class="main">
      <p class="eyebrow">Transmission received</p>
      <h1 class="headline">
        <span class="hello">Hello,</span>
        <span class="world">World.</span>
      </h1>
      <p class="sub">The first message. The oldest program.<br>Still, somehow, the best one.</p>
      <div class="divider"></div>
    </main>

    <div class="right-gutter"></div>

    <div class="bottom-bar">
      <span class="ts" id="timeLabel"></span>
      <span class="counter">p. 001</span>
    </div>
  </div>

  <script>
    function update() {
      const now = new Date();
      document.getElementById('dateLabel').textContent =
        now.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();
      document.getElementById('timeLabel').textContent =
        now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
